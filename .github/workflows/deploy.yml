name: Deploy to Databricks

on:
  push:
    branches:
      - main
  create:
    tags:
      - 'v1.*'
      - 'v2.*'

jobs:
  # ─────────────────────────────────────────────
  # Deploy BOTH apps to dev on every push to main
  # ─────────────────────────────────────────────
  deploy-v1-dev:
    name: Deploy v1 → dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot-v1-multi-agent-supervisor
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Start and deploy app
        run: |
          WORKSPACE_USER=$(databricks current-user me --output json | jq -r '.userName')
          SOURCE_PATH="/Workspace/Users/${WORKSPACE_USER}/.bundle/databricks-chatbot/dev/files"
          APP_NAME=$(databricks bundle validate --target dev --output json | jq -r '.resources.apps.databricks_chatbot.name')
          echo "App: $APP_NAME | Source: $SOURCE_PATH"

          # Start the app if stopped; suppress error if already running
          databricks apps start "$APP_NAME" && echo "Start issued." || echo "App may already be running."

          # Wait up to 5 minutes for compute to become ACTIVE
          echo "Waiting for app to reach ACTIVE state..."
          for i in $(seq 1 30); do
            STATE=$(databricks apps get "$APP_NAME" --output json | jq -r '.compute_status.state // "UNKNOWN"')
            echo "  [$i/30] state=$STATE"
            [ "$STATE" = "ACTIVE" ] && break
            [ $i -eq 30 ] && { echo "ERROR: Timed out waiting for ACTIVE state."; exit 1; }
            sleep 10
          done

          echo "Deploying source..."
          databricks apps deploy "$APP_NAME" --source-code-path "$SOURCE_PATH"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  deploy-v2-dev:
    name: Deploy v2 → dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot-v2-simplified-output
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Start and deploy app
        run: |
          WORKSPACE_USER=$(databricks current-user me --output json | jq -r '.userName')
          SOURCE_PATH="/Workspace/Users/${WORKSPACE_USER}/.bundle/databricks-chatbot-v2/dev/files"
          APP_NAME=$(databricks bundle validate --target dev --output json | jq -r '.resources.apps.databricks_chatbot.name')
          echo "App: $APP_NAME | Source: $SOURCE_PATH"

          # Start the app if stopped; suppress error if already running
          databricks apps start "$APP_NAME" && echo "Start issued." || echo "App may already be running."

          # Wait up to 5 minutes for compute to become ACTIVE
          echo "Waiting for app to reach ACTIVE state..."
          for i in $(seq 1 30); do
            STATE=$(databricks apps get "$APP_NAME" --output json | jq -r '.compute_status.state // "UNKNOWN"')
            echo "  [$i/30] state=$STATE"
            [ "$STATE" = "ACTIVE" ] && break
            [ $i -eq 30 ] && { echo "ERROR: Timed out waiting for ACTIVE state."; exit 1; }
            sleep 10
          done

          echo "Deploying source..."
          databricks apps deploy "$APP_NAME" --source-code-path "$SOURCE_PATH"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # ─────────────────────────────────────────────
  # Deploy v1 to prod on tags like v1.0.0
  # ─────────────────────────────────────────────
  deploy-v1-prod:
    name: Deploy v1 → prod
    if: github.event_name == 'create' && startsWith(github.ref, 'refs/tags/v1.')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot-v1-multi-agent-supervisor
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Start and deploy app
        run: |
          WORKSPACE_USER=$(databricks current-user me --output json | jq -r '.userName')
          SOURCE_PATH="/Workspace/Users/${WORKSPACE_USER}/.bundle/databricks-chatbot/prod/files"
          APP_NAME=$(databricks bundle validate --target prod --output json | jq -r '.resources.apps.databricks_chatbot.name')
          echo "App: $APP_NAME | Source: $SOURCE_PATH"

          # Start the app if stopped; suppress error if already running
          databricks apps start "$APP_NAME" && echo "Start issued." || echo "App may already be running."

          # Wait up to 5 minutes for compute to become ACTIVE
          echo "Waiting for app to reach ACTIVE state..."
          for i in $(seq 1 30); do
            STATE=$(databricks apps get "$APP_NAME" --output json | jq -r '.compute_status.state // "UNKNOWN"')
            echo "  [$i/30] state=$STATE"
            [ "$STATE" = "ACTIVE" ] && break
            [ $i -eq 30 ] && { echo "ERROR: Timed out waiting for ACTIVE state."; exit 1; }
            sleep 10
          done

          echo "Deploying source..."
          databricks apps deploy "$APP_NAME" --source-code-path "$SOURCE_PATH"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # ─────────────────────────────────────────────
  # Deploy v2 to prod on tags like v2.0.0
  # ─────────────────────────────────────────────
  deploy-v2-prod:
    name: Deploy v2 → prod
    if: github.event_name == 'create' && startsWith(github.ref, 'refs/tags/v2.')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot-v2-simplified-output
    steps:
